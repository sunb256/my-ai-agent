global:
  scrape_interval: 5s
  scrape_timeout: 4s
  evaluation_interval: 15s
  external_labels:
    stack: vllm-monitoring

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
  - job_name: vllm
    metrics_path: /metrics
    static_configs:
      - targets:
          - vllm:8000
        labels:
          service: vllm
