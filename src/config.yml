llm:
  model: "openai/gemma4:e4b-mlx"
  base_url: "http://localhost:11434/v1"
  temperature: 0.2

agent:
  name: "sample-agent"
  system_prompt: |
    あなたは簡潔に回答するAIアシスタントです。
    必要なら利用可能なツールを使ってください。
  max_steps: 10
  code_exec: True
  # code_exec_image: "python"
  code_exec_image: "ai-agent-python:local"
  skills_dir: "resources/skills"
